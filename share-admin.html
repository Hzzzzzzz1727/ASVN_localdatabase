<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <title>TV Repair - Quan Ly Link Xem</title>
</head>
<body>
  <div id="share-admin-app"></div>
  <script>
    const isLocalHost = ['localhost', '127.0.0.1'].includes(location.hostname)

    if (isLocalHost && 'serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
        .then(() => ('caches' in window ? caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))) : null))
        .catch(() => {})
    }
  </script>
  <script type="module" src="/src/share-admin-main.js"></script>
</body>
</html>
